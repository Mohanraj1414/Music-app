# Increase JVM heap for Gradle build
org.gradle.jvmargs=-Xmx16G -XX:MaxMetaspaceSize=8G -XX:ReservedCodeCacheSize=1024m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX configuration
android.useAndroidX=true
android.enableJetifier=true

# Optimize for large projects
android.gradle.projectIsolation=false

# Disable Jetifier warnings (we're using built-in Kotlin)
android.suppressUnsupportedCompileSdkWarning=true

# Plugin compatibility
android.suppressUnsupportedRtlMode=true
android.defaults.buildfeatures.aidl=false
android.defaults.buildfeatures.renderscript=false

# Improve build performance
org.gradle.configureondemand=false
org.gradle.workers.max=8
org.gradle.vfs.watch=true
