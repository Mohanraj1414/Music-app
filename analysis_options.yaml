# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Vendored FRB/cargokit helper package has its own pubspec and dependency graph.
    # Root-level flutter analyze should not traverse it.
    - rust_builder/cargokit/build_tool/**
    - packages/icons_plus_fix/.dart_tool/**
  errors:
    # Treat everything as a warning by default
    missing_required_param: warning
    missing_return: warning
    todo: ignore
    deprecated_member_use_from_same_package: ignore

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # Important rules
    - avoid_empty_else
    - avoid_print
    - avoid_relative_lib_imports
    - avoid_returning_null_for_future
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - comment_references
    - control_flow_in_finally
    - empty_statements
    - hash_and_equals
    - invariant_booleans
    - iterable_contains_unrelated_type
    - list_remove_unrelated_type
    - no_adjacent_strings_in_list
    - no_duplicate_case_values
    - prefer_void_to_null
    - throw_in_finally
    - unnecessary_statements
    - unrelated_type_equality_checks
    
    # Disabled rules (too strict for this project)
    - avoid_classes_with_only_static_members: false
    - avoid_positional_boolean_parameters: false
    - avoid_private_typedef_functions: false
    - camel_case_extensions: false
    - camel_case_types: false
    - constant_identifier_names: false
    - curly_braces_in_flow_control_structures: false
    - directives_ordering: false
    - lines_longer_than_80_chars: false
    - null_closures: false
    - omit_local_variable_types: false
    - one_member_abstracts: false
    - only_throw_errors: false
    - prefer_constructors_over_static_methods: false
    - prefer_final_fields: false
    - prefer_final_locals: false
    - sized_box_for_whitespace: false
    - sort_pub_dependencies: false
    - sort_unnamed_constructors_first: false
    - use_key_in_widget_constructors: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
