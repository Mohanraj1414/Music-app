name: icons_plus
description: Fixed icons_plus package compatible with Flutter 3.27+
version: 5.0.1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  fonts:
    - family: MingCute
      fonts:
        - asset: fonts/MingCute.ttf
    - family: AntDesign
      fonts:
        - asset: fonts/AntDesign.ttf
