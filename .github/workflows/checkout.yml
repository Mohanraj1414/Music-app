name: "CI"

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'fastlane/**'
      - '.github/FUNDING.yml'
      - 'ghpage/**'
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1: FLUTTER CHECKS
  # ==========================================
  flutter-check:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          cd packages/icons_plus_fix && flutter pub get && cd ../..

      - name: Static Code Analysis
        run: |
          echo "=== Starting Flutter Analysis ==="
          flutter analyze --no-fatal-infos --no-fatal-warnings || true
        continue-on-error: true
          
      - name: Format Check (Dart)
        run: dart format --set-exit-if-changed lib/ test/ 2>/dev/null || true
        continue-on-error: true

      - name: Run Unit Tests
        run: |
          flutter test test/ --coverage 2>&1 || true
        continue-on-error: true


  # ==========================================
  # JOB 2: RUST CHECKS (flutter_rust_bridge)
  # ==========================================
  rust-check:
    name: Rust Clippy & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust" 

      - name: Check Rust Code
        run: |
          echo "=== Cargo Check ==="
          cd rust && cargo check 2>&1 || true
        continue-on-error: true

      - name: Rust Formatting
        run: |
          echo "=== Cargo Fmt ==="
          cd rust && cargo fmt -- --check 2>&1 || true
        continue-on-error: true

      - name: Rust Clippy Lints
        run: |
          echo "=== Cargo Clippy ==="
          cd rust && cargo clippy --all-targets 2>&1 || true
        continue-on-error: true